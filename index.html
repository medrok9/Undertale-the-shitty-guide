  <style>
    body {
      background: #0f0f12;
      font-family: "Courier New", monospace;
      color: white;
    }

    h1 {
      text-align: center;
      margin-top: 30px;
    }

    .dialogue-box {
      width: 100%;
      max-width: 700px;
      margin: 20px auto;
      padding: 18px;
      border: 4px solid white;
      background: #000;
      position: relative;
    }

    .dialogue-name {
      position: absolute;
      top: -18px;
      left: 10px;
      background: black;
      padding: 0 8px;
      font-weight: bold;
    }

    .dialogue-text {
      font-size: 16px;
      line-height: 1.5;
      min-height: 60px;
    }

    .choice-buttons {
      display: grid;
      gap: 10px;
      max-width: 400px;
      margin: 30px auto;
    }

    .btn {
      font-family: Arial, sans-serif;
    }

  </style>
</head>

<body>

<h1>Undertale: Choose Your Path</h1>

<div id="dialogue-container" class="container-fluid"></div>

<div class="container-fluid">
  <div class="choice-buttons">
    <a href="Undertale-the-shitty-guide/runs/passifist.html" class="btn btn-primary btn-lg">True Pacifist Route</a>
    <a href="Undertale-the-shitty-guide/runs/mean.html" class="btn btn-danger btn-lg">Genocide Route</a>
  </div>
</div>
<!-- Thank god for stack overflow, I have no clue how the hell this works-->
<script>
  
  const dialogue = [
    { name: "???", text: "Welcome, human." },
    { name: "???", text: "This world responds to your choices." },
    { name: "???", text: "Will you show mercy... or determination?" }
  ];

  let index = 0;
  let charIndex = 0;
  let currentBox = null;
  let typing = true;

  function createBox(name) {
    const box = document.createElement("div");
    box.className = "dialogue-box";

    const n = document.createElement("div");
    n.className = "dialogue-name";
    n.innerText = name;

    const t = document.createElement("div");
    t.className = "dialogue-text";

    box.appendChild(n);
    box.appendChild(t);

    document.getElementById("dialogue-container").appendChild(box);

    return t;
  }

  function typeNext() {
    if (index >= dialogue.length) return;

    if (!currentBox) {
      currentBox = createBox(dialogue[index].name);
    }

    const fullText = dialogue[index].text;

    if (charIndex < fullText.length) {
      currentBox.innerHTML += fullText.charAt(charIndex);
      charIndex++;
      setTimeout(typeNext, 35);
    } else {
      index++;
      charIndex = 0;
      currentBox = null;
      setTimeout(typeNext, 500);
    }
  }

  document.addEventListener("click", () => {
    if (index < dialogue.length && currentBox) {
      currentBox.innerHTML = dialogue[index].text;
      charIndex = dialogue[index].text.length;
    }
  });

  typeNext();
</script>
